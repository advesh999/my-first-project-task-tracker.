<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ProTask | Minimalist Productivity</title>
    <style>
        :root {
            --bg: #e0e5ec;
            --container-bg: rgba(255, 255, 255, 0.7);
            --text: #31344b;
            --accent: #4a90e2;
        }

        [data-theme="dark"] {
            --bg: #1a1a1a;
            --container-bg: rgba(40, 40, 40, 0.8);
            --text: #ffffff;
            --accent: #74b9ff;
        }

        body { 
            font-family: 'Inter', sans-serif; 
            background: var(--bg); 
            color: var(--text);
            display: flex; justify-content: center; align-items: center;
            height: 100vh; margin: 0; transition: 0.3s;
        }

        .glass-card {
            background: var(--container-bg);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            padding: 2rem; border-radius: 24px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.1);
            width: 100%; max-width: 400px; text-align: center;
        }

        input {
            width: 70%; padding: 12px; border: none; border-radius: 12px;
            background: rgba(255,255,255,0.5); margin-bottom: 10px;
        }

        button {
            padding: 12px 20px; border: none; border-radius: 12px;
            cursor: pointer; font-weight: 600; transition: 0.2s;
        }

        .btn-add { background: var(--accent); color: white; }
        .btn-add:hover { transform: scale(1.05); }

        .theme-toggle {
            position: absolute; top: 20px; right: 20px;
            background: var(--container-bg); padding: 10px; border-radius: 50%;
        }

        ul { list-style: none; padding: 0; margin-top: 20px; }
        li {
            background: rgba(255,255,255,0.2); padding: 15px;
            margin-bottom: 10px; border-radius: 12px;
            display: flex; justify-content: space-between; align-items: center;
            animation: fadeIn 0.4s ease;
        }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } }
    </style>
</head>
<body data-theme="light">

    <button class="theme-toggle" onclick="toggleTheme()">🌓</button>

    <div class="glass-card">
        <h1>ProTask</h1>
        <p id="stats">0 Tasks Remaining</p>
        <input type="text" id="taskInput" placeholder="Focus on what matters...">
        <button class="btn-add" onclick="addTask()">Add</button>
        <ul id="taskList"></ul>
    </div>

    <script>
        // Load data on start
        document.addEventListener('DOMContentLoaded', getTasks);

        function addTask() {
            const input = document.getElementById('taskInput');
            if (input.value === "") return;

            createTaskElement(input.value);
            saveLocal(input.value);
            input.value = "";
            updateStats();
        }

        function createTaskElement(text) {
            const li = document.createElement('li');
            li.innerHTML = `<span>${text}</span><button onclick="removeTask(this)" style="background:transparent; font-size:1.2rem;">✅</button>`;
            document.getElementById('taskList').appendChild(li);
        }

        function removeTask(btn) {
            const text = btn.parentElement.firstChild.innerText;
            btn.parentElement.remove();
            removeLocal(text);
            updateStats();
        }

        function updateStats() {
            const count = document.querySelectorAll('li').length;
            document.getElementById('stats').innerText = `${count} Tasks Remaining`;
        }

        function toggleTheme() {
            const body = document.body;
            body.dataset.theme = body.dataset.theme === "dark" ? "light" : "dark";
        }

        // Local Storage Magic
        function saveLocal(task) {
            let tasks = localStorage.getItem("tasks") ? JSON.parse(localStorage.getItem("tasks")) : [];
            tasks.push(task);
            localStorage.setItem("tasks", JSON.stringify(tasks));
        }

        function getTasks() {
            let tasks = localStorage.getItem("tasks") ? JSON.parse(localStorage.getItem("tasks")) : [];
            tasks.forEach(task => createTaskElement(task));
            updateStats();
        }

        function removeLocal(task) {
            let tasks = JSON.parse(localStorage.getItem("tasks"));
            tasks = tasks.filter(t => t !== task);
            localStorage.setItem("tasks", JSON.stringify(tasks));
        }
    </script>
</body>
</html>
