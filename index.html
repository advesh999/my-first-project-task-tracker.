<!DOCTYPE html>
<html>
<head>
    <title>My Task List</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; text-align: center; background: #f0f2f5; margin-top: 50px; }
        .container { background: white; padding: 20px; border-radius: 10px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); display: inline-block; min-width: 300px; }
        input { padding: 10px; border: 1px solid #ddd; border-radius: 5px; width: 70%; }
        button { padding: 10px; background: #2ea44f; color: white; border: none; border-radius: 5px; cursor: pointer; }
        ul { list-style: none; padding: 0; margin-top: 20px; }
        li { background: #fff; border-bottom: 1px solid #eee; padding: 10px; display: flex; justify-content: space-between; align-items: center; }
    </style>
</head>
<body>
    <div class="container">
        <h1>My Tasks</h1>
        <input type="text" id="taskInput" placeholder="What needs to be done?">
        <button onclick="addTask()">Add</button>
        <ul id="taskList"></ul>
    </div>

    <script>
        function addTask() {
            let input = document.getElementById('taskInput');
            let ul = document.getElementById('taskList');
            if (input.value.trim() !== "") {
                let li = document.createElement('li');
                li.innerHTML = input.value + ' <button onclick="this.parentElement.remove()" style="background:#d73a49; padding: 5px 10px;">Done</button>';
                ul.appendChild(li);
                input.value = "";
            }
        }
    </script>
</body>
</html>
